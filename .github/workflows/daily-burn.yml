name: Daily Burn Job

on:
  schedule:
    # Runs at 11:55pm UTC every day
    # Adjust if your 11:55pm is in a different timezone:
    #   UTC-5 (EST)  → 04:55 UTC → "55 4 * * *"
    #   UTC+1 (WAT)  → 22:55 UTC → "55 22 * * *"
    #   UTC+2 (SAST) → 21:55 UTC → "55 21 * * *"
    - cron: "55 23 * * *"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  burn:
    name: Process All Token Burns
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run burn job
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: node run-once.js
        timeout-minutes: 30
